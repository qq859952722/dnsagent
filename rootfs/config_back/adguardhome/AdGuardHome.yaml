bind_host: 0.0.0.0
bind_port: 3000
beta_bind_port: 0
beta_bind_host: ""
users:
- name: admin
  password: "$2a$10$..."
home: /opt/AdGuardHome
rlimit_nofile: 0
tls:
  enabled: false
  server_name: localhost
  force_https: false
  port_https: 443
  port_dns_over_tls: 853
  port_dns_over_quic: 784
  port_dnscrypt: 0
  dnscrypt_config_file: ""
  cert_file: ""
  key_file: ""
  ca_file: ""
  strict_sni_check: false
  cipher_suites: ""
querylog:
  enabled: true
  file_enabled: true
  interval: 24h
  size_memory: 1000
  max_file_size: 100
  log_browser: false
  anonymize_client_ip: false
  anonymize_client_ipv6: false
  enabled_filters: []
statistics:
  enabled: true
  interval: 1h
  size_memory: 1000
  db_path: data/statistics.db
filters:
- enabled: true
  url: https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
  name: AdGuard DNS filter
  id: 1
- enabled: true
  url: https://adaway.org/hosts.txt
  name: AdAway
  id: 2
- enabled: true
  url: https://hosts-file.net/ad_servers.txt
  name: hpHosts - Ad and Tracking servers only
  id: 3
- enabled: false
  url: https://www.malwaredomainlist.com/hostslist/hosts.txt
  name: MalwareDomainList.com Hosts List
  id: 4
whitelist_filters: []
user_rules: []
blocked_services: []
upstreams:
- https://dns.cloudflare.com/dns-query
- https://8.8.8.8/dns-query
- https://9.9.9.9/dns-query
dns:
  bind_hosts:
  - 0.0.0.0
  port: 53
  anonymize_client_ip: false
  protection_enabled: true
  blocking_mode: default
  blocking_ipv4: ""
  blocking_ipv6: ""
  blocked_response_ttl: 10
  parental_block_host: family-block.dns.adguard.com
  safebrowsing_block_host: standard-block.dns.adguard.com
  ratelimit: 0
  refuse_any: false
  upstream_timeout: 10s
  upstream_fallback_dns:
  - 8.8.8.8
  - 8.8.4.4
  bootstrap_dns:
  - 8.8.8.8
  - 8.8.4.4
  all_servers: false
  fastest_addr: false
  fastest_timeout: 1s
  allowed_clients: []
  disallowed_clients: []
  blocked_hosts:
  - version.bind
  - id.server
  - hostname.bind
  cache_size: 4194304
  cache_ttl_min: 0
  cache_ttl_max: 0
  cache_optimistic: false
  bogus_nxdomain: []
  aaaa_disabled: false
  enable_dnssec: false
  edns_client_subnet: false
  max_goroutines: 300
  handle_ddr: true
tls_client_config:
  enabled: false
  server_name: ""
  client_cert: ""
  client_key: ""
  root_cert: ""
  certificate_verification: true
os:
  group: ""
  user: ""
schema_version: 18
