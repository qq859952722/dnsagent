# SmartDNS configuration file

# Bind address
bind 0.0.0.0:53

# DNS servers
server 8.8.8.8 -exclude-default-group -group google
server 8.8.4.4 -exclude-default-group -group google
server 1.1.1.1 -exclude-default-group -group cloudflare
server 1.0.0.1 -exclude-default-group -group cloudflare
server 9.9.9.9 -exclude-default-group -group quad9

# China DNS servers
server 114.114.114.114 -exclude-default-group -group china
server 114.114.115.115 -exclude-default-group -group china

# Default group
server 8.8.8.8
server 1.1.1.1

# Speed check settings
speed-check-mode tcp:443,ping

# Domain rules
# Google services
nameserver /google.com/googleapis.com/gstatic.com/fonts.googleapis.com/ggpht.com/  -group google
# Cloudflare services
nameserver /cloudflare.com/ -group cloudflare
# China websites
nameserver /baidu.com/taobao.com/tmall.com/jd.com/qq.com/weibo.com/ -group china

# CNAME and PTR settings
cname-ttl 3600
ptr-ttl 3600

# Log settings
log-level error
log-file /var/log/smartdns.log

# Cache settings
cache-size 4096
cache-ttl 3600
cache-persist yes
cache-file /var/cache/smartdns.cache

# Other settings
rr-ttl 300
prefetch-domain yes
prefetch-full yes

# Reverse lookup
reverse-lookup yes
