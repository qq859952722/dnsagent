version: '3.8'

services:
  dnsagent:
    image: dnsagent:latest
    container_name: dnsagent
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3000:3000/tcp"
      - "80:80/tcp"
    volumes:
      - ./config:/config
    environment:
      - UPDATE_LISTS_ON_START=false
      - UPDATE_LISTS_CRON=0 3 * * 0
    networks:
      - dnsagent_net
    healthcheck:
      test: ["CMD", "nslookup", "-query=A", "google.com", "127.0.0.1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0

networks:
  dnsagent_net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
        - subnet: fd00:dead:beef:c0::/80
