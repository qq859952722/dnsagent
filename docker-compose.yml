services:
  dnsagent:
    image: ghcr.io/qq859952722/dnsagent:latest
    container_name: dnsagent

    
    # 端口映射
    ports:
      # ============================================================
      # DNS 服务 (TCP/UDP 53)
      # ============================================================
      # IPv4 DNS
      - "53:53/tcp"                    # DNS TCP (IPv4)
      - "53:53/udp"                    # DNS UDP (IPv4)
      
      # IPv6 DNS - 可选，根据需求启用
      # - "[::1]:53:53/tcp"              # DNS TCP (IPv6 localhost)
      # - "[::1]:53:53/udp"              # DNS UDP (IPv6 localhost)
      # - "[fd00::2]:53:53/tcp"          # DNS TCP (IPv6 网络)
      # - "[fd00::2]:53:53/udp"          # DNS UDP (IPv6 网络)
      
      # ============================================================
      # AdGuardHome Web UI (TCP 80/443)
      # ============================================================
      - "80:80/tcp"                    # HTTP Web UI (IPv4)
      # - "443:443/tcp"                # HTTPS Web UI (可选)
      
      # IPv6 Web UI - 可选
      # - "[::1]:80:80/tcp"             # HTTP Web UI (IPv6)
      # - "[::1]:443:443/tcp"           # HTTPS Web UI (IPv6)
      
      # ============================================================
      # 其他 DNS 服务端口
      # ============================================================
      # SmartDNS
      - "5353:5353/tcp"                # SmartDNS TCP
      - "5353:5353/udp"                # SmartDNS UDP
      
      # DNSCrypt Proxy
      - "5054:5054/tcp"                # DNSCrypt TCP
      - "5054:5054/udp"                # DNSCrypt UDP
    
    # 数据卷配置
    volumes:
      # DNS 配置文件持久化
      # 包含: AdGuardHome、SmartDNS、DNSCrypt 配置，以及规则列表
      - ./dns-config:/config
      
      # 日志目录
      - ./dns-logs:/var/log
    
    # 环境变量
    environment:
      # 时区设置
      TZ: Asia/Shanghai
      # 可根据需求添加其他环境变量
      # DNS_SERVERS: 8.8.8.8,8.8.4.4       # 上游 DNS 服务器
    
    # 容器绑定策略
    restart: always                    # 容器停止后自动重启
    
    # 特权模式 - 非严格必需，根据安全需求调整
    privileged: false
    
    # 资源限制 (可选，根据实际环境调整)
    # mem_limit: 512m                  # 内存限制 512MB
    # cpus: '1.0'                      # CPU 限制 1 核
    
    # 网络配置
    networks:
      ibridge: {}

networks:
  ibridge:
    external: true

# ============================================================
# 使用说明
# ============================================================
#
# 1. 创建 IPv6 网络 (必须先执行此步骤)
#    docker network create \
#      --driver bridge \
#      --subnet 172.20.0.0/16 \
#      --ipv6 \
#      --subnet fd00::/64 \
#      ibridge
#
# 2. 启动容器
#    docker compose up -d
#
# 3. 验证网络
#    docker network inspect ibridge
#
# 4. 查看容器状态
#    docker compose ps
#
# 5. 查看日志
#    docker compose logs -f dnsagent
#
# 6. 停止容器
#    docker compose down
#
# 7. 删除网络 (如不再使用)
#    docker network rm ibridge
#
# ============================================================
# 网络配置说明
# ============================================================
#
# IPv4 配置:
#   - 网络: 172.20.0.0/16
#   - 容器 IP: 172.20.0.2
#   - 网关: 172.20.0.1
#
# IPv6 配置:
#   - 网络: fd00::/64
#   - 容器 IP: fd00::2
#   - 网关: fd00::1
#
# ============================================================
# 密钥代不同场景的配置示例
# ============================================================
#
# 只使用 IPv4 (remove IPv6 ports)
# 保险起见，注释掉所有 IPv6 端口映射
#
# 启用所有 IPv6 支持
# 取消注释所有 [::1] 和 [fd00::2] 的端口映射
#
# 负载均衡 (使用多个容器)
# 创建 dnsagent01, dnsagent02 等服务
# 为每个分配不同的 IPv4 和 IPv6 地址
#
# ============================================================
